name: CI
on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - review_requested

permissions:
  contents: read

jobs:
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Tesseract
        uses: ./.github/actions/setup-deps
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust"
          cache-directories: |
            ~/.tesseract-rs
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    needs: [ rust-lint ]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Tesseract
        uses: ./.github/actions/setup-deps
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust"
          cache-directories: |
            ~/.tesseract-rs
      - name: Run tests
        run: cargo test

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Depenencies
        uses: ./.github/actions/setup-deps
      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: |
            ~/.tesseract-rs
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Ruff check
        run: uv run ruff check python/
      - name: Ruff format
        run: uv run ruff format --check python/

  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    needs: [ python-lint, rust-lint ]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Depenencies
        uses: ./.github/actions/setup-deps
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust"
          cache-directories: |
            ~/.tesseract-rs
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Install dependencies
        run: uv sync --group dev
      - name: Build Rust extension
        run: uv run maturin develop
      - name: Run pytest
        run: uv run pytest
